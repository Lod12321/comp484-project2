<!DOCTYPE html>
<html>
  <head>
    <title>My Giga Pet</title>
    <meta name="description" content="A cool thing made with Glitch">
    <link id="favicon" rel="icon" href="https://glitch.com/edit/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous"></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <h1>
        This is my Giga Pet !
      </h1>
    </header>

    <main>
      <section class="pet-image-container">
         <!-- Pet image - displays your virtual pet (Froakie Pokemon) -->
        <img class="pet-image" src="images/froakie-pet.webp" alt="Froakie - Your Giga Pet">
      </section>
      <section class="dashboard">
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>Weight: <strong><span class="weight"></span> pounds</strong></div>
        <div>Happiness: <strong><span class="happiness"></span> head nods (per min)</strong></div>
        <div>Mood: <strong><span class="mood">Happy</span></strong></div>
        <div class="pet-notification"></div>
        <div class="button-container">
          <button class="pet-button" data-action="feed">
            Feed
          </button>
          <button class="pet-button" data-action="pet">
            Pet
          </button>
          <button class="pet-button" data-action="play">
            Play
          </button>
          <button class="pet-button" data-action="rest">
            Rest
          </button>
          <button class="pet-button" data-action="ignore">
            Ignore
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
